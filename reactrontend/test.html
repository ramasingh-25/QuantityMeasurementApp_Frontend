<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Landing Page Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

        :root {
            --bg-color: #0a0a0f;
            --card-bg: rgba(255,255,255,0.03);
            --accent: #00d4ff;
            --accent-sec: #7b61ff;
            --accent-ter: #ff6b6b;
            --text-primary: #fff;
            --text-secondary: #a0a0b0;
            --border: rgba(255,255,255,0.1);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            --shadow-glow: 0 0 30px rgba(0,212,255,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent), var(--accent-sec));
            color: #000;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            transition: var(--transition);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .category-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .category-tab.active {
            background: rgba(0,212,255,0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .result-display {
            margin-top: 24px;
            padding: 24px;
            background: rgba(0,212,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.2);
        }

        .result-main {
            font-size: 32px;
            font-weight: 600;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
        }

        .result-formula {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(0,212,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useContext, createContext } = React;
        const { BrowserRouter, Routes, Route, Link, useNavigate } = ReactRouterDOM;

        // Mock AuthContext
        const AuthContext = createContext(null);
        const useAuth = () => ({ isAuthenticated: false });

        // Lucide icons (simplified)
        const ArrowRight = () => <span>→</span>;
        const Ruler = () => <span>📏</span>;
        const Weight = () => <span>⚖️</span>;
        const Thermometer = () => <span>🌡️</span>;
        const Beaker = () => <span>🧪</span>;
        const Calculator = () => <span>🧮</span>;
        const History = () => <span>📜</span>;

        const UNITS = {
            length: {
                label: 'Length',
                units: ['METER', 'KILOMETER', 'CENTIMETERS', 'FEET', 'INCHES', 'YARDS'],
                toBase: { METER: 100, KILOMETER: 100000, CENTIMETERS: 1, FEET: 30.48, INCHES: 2.54, YARDS: 91.44 },
                icon: Ruler,
                color: '#00d4ff'
            },
            weight: {
                label: 'Weight / Mass',
                units: ['KILOGRAM', 'GRAM', 'POUND'],
                toBase: { KILOGRAM: 1, GRAM: 0.001, POUND: 0.453592 },
                icon: Weight,
                color: '#7b61ff'
            },
            temperature: {
                label: 'Temperature',
                units: ['Celsius', 'Fahrenheit', 'Kelvin'],
                toBase: null,
                icon: Thermometer,
                color: '#ff6b6b'
            },
            volume: {
                label: 'Volume',
                units: ['LITRE', 'MILLILITRE', 'GALLON'],
                toBase: { LITRE: 1, MILLILITRE: 0.001, GALLON: 3.78541 },
                icon: Beaker,
                color: '#10b981'
            }
        };

        const Landing = () => {
            const { isAuthenticated } = useAuth();
            const [currentCategory, setCurrentCategory] = useState('length');
            const [inputValue, setInputValue] = useState('1');
            const [fromUnit, setFromUnit] = useState('METER');
            const [toUnit, setToUnit] = useState('CENTIMETERS');
            const [result, setResult] = useState(null);

            const currentUnits = UNITS[currentCategory];
            const CategoryIcon = currentUnits.icon;

            const handleConvert = () => {
                const val = parseFloat(inputValue);
                if (isNaN(val)) return;

                if (currentCategory === 'temperature') {
                    let res = val;
                    if (fromUnit === toUnit) {
                        res = val;
                    } else if (fromUnit === 'Celsius') {
                        if (toUnit === 'Fahrenheit') res = (val * 9/5) + 32;
                        else if (toUnit === 'Kelvin') res = val + 273.15;
                    } else if (fromUnit === 'Fahrenheit') {
                        if (toUnit === 'Celsius') res = (val - 32) * 5/9;
                        else if (toUnit === 'Kelvin') res = (val - 32) * 5/9 + 273.15;
                    } else if (fromUnit === 'Kelvin') {
                        if (toUnit === 'Celsius') res = val - 273.15;
                        else if (toUnit === 'Fahrenheit') res = (val - 273.15) * 9/5 + 32;
                    }
                    setResult(parseFloat(res.toPrecision(8)));
                } else {
                    const fromFactor = currentUnits.toBase[fromUnit];
                    const toFactor = currentUnits.toBase[toUnit];
                    if (!fromFactor || !toFactor) return;
                    const res = val * (fromFactor / toFactor);
                    setResult(parseFloat(res.toPrecision(8)));
                }
            };

            return (
                <div style={{ paddingTop: '40px' }}>
                    {/* Hero Section */}
                    <div className="card" style={{ marginBottom: '32px', textAlign: 'center', padding: '60px 40px' }}>
                        <h1 style={{ fontSize: '42px', marginBottom: '16px', background: 'linear-gradient(135deg, #fff, #00d4ff)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                            Universal Unit Converter
                        </h1>
                        <p style={{ fontSize: '18px', color: 'var(--text-secondary)', maxWidth: '600px', margin: '0 auto 32px' }}>
                            Convert between different measurement units with precision and ease. Length, weight, temperature, volume, and more.
                        </p>
                        <div style={{ display: 'flex', gap: '16px', justifyContent: 'center' }}>
                            <Link to="/dashboard" className="btn btn-accent">
                                <Calculator size={18} style={{ marginRight: '8px' }} />
                                Start Converting
                                <ArrowRight size={18} style={{ marginLeft: '8px' }} />
                            </Link>
                            {isAuthenticated ? (
                                <Link to="/history" className="btn btn-ghost">
                                    <History size={18} style={{ marginRight: '8px' }} />
                                    View History
                                </Link>
                            ) : (
                                <Link to="/signup" className="btn btn-ghost">
                                    Create Account
                                </Link>
                            )}
                        </div>
                    </div>

                    {/* Quick Converter */}
                    <div className="card" style={{ marginBottom: '32px' }}>
                        <h2 style={{ fontSize: '24px', marginBottom: '24px', display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <CategoryIcon size={24} color={currentUnits.color} />
                            Quick Convert
                        </h2>

                        {/* Category Tabs */}
                        <div className="category-tabs">
                            {Object.entries(UNITS).map(([key, data]) => {
                                const Icon = data.icon;
                                return (
                                    <button
                                        key={key}
                                        className={`category-tab ${currentCategory === key ? 'active' : ''}`}
                                        style={{
                                            background: currentCategory === key ? `${data.color}20` : 'transparent',
                                            border: `1px solid ${currentCategory === key ? data.color : 'var(--border)'}`,
                                            color: currentCategory === key ? data.color : 'var(--text-secondary)'
                                        }}
                                        onClick={() => {
                                            setCurrentCategory(key);
                                            setFromUnit(data.units[0]);
                                            setToUnit(data.units[1]);
                                            setResult(null);
                                        }}
                                    >
                                        <Icon size={16} style={{ marginRight: '8px' }} />
                                        {data.label}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Converter Input */}
                        <div className="converter-grid">
                            <div>
                                <label style={{ display: 'block', marginBottom: '8px', fontSize: '14px', color: 'var(--text-secondary)' }}>
                                    Value
                                </label>
                                <input
                                    type="number"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    placeholder="Enter value"
                                />
                            </div>

                            <div>
                                <label style={{ display: 'block', marginBottom: '8px', fontSize: '14px', color: 'var(--text-secondary)' }}>
                                    From
                                </label>
                                <select value={fromUnit} onChange={(e) => setFromUnit(e.target.value)}>
                                    {currentUnits.units.map(unit => (
                                        <option key={unit} value={unit}>{unit}</option>
                                    ))}
                                </select>
                            </div>

                            <div>
                                <label style={{ display: 'block', marginBottom: '8px', fontSize: '14px', color: 'var(--text-secondary)' }}>
                                    To
                                </label>
                                <select value={toUnit} onChange={(e) => setToUnit(e.target.value)}>
                                    {currentUnits.units.map(unit => (
                                        <option key={unit} value={unit}>{unit}</option>
                                    ))}
                                </select>
                            </div>

                            <button className="btn btn-accent" onClick={handleConvert} style={{ height: '44px' }}>
                                <ArrowRight size={18} />
                            </button>
                        </div>

                        {/* Result */}
                        {result !== null && (
                            <div className="result-display">
                                <div className="result-main">{result}</div>
                                <div className="result-formula">{inputValue} {fromUnit} = {result} {toUnit}</div>
                            </div>
                        )}
                    </div>

                    {/* Features */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '24px' }}>
                        {Object.entries(UNITS).map(([key, data]) => {
                            const Icon = data.icon;
                            return (
                                <div key={key} className="card" style={{ borderColor: `${data.color}30` }}>
                                    <div className="feature-icon">
                                        <Icon size={24} color={data.color} />
                                    </div>
                                    <h3 style={{ fontSize: '18px', marginBottom: '8px' }}>{data.label}</h3>
                                    <p style={{ fontSize: '14px', color: 'var(--text-secondary)' }}>
                                        {data.units.join(', ')}
                                    </p>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const App = () => (
            <BrowserRouter>
                <Routes>
                    <Route path="/" element={<Landing />} />
                </Routes>
            </BrowserRouter>
        );

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
