<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeasureX — Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<div class="bg-grid"></div>

<!-- NAV -->
<nav>
  <a href="landing.html" class="logo">Measure<span>X</span></a>
  <div class="nav-right">
    <a href="history.html" class="btn btn-ghost">History</a>
    <div id="userChip" class="user-chip" style="display:none">
      <span class="dot"></span>
      <span id="userName">Guest</span>
    </div>
    <a href="login.html" id="navLoginBtn" class="btn btn-accent" style="display:none">Login</a>
    <button id="navLogoutBtn" class="btn btn-ghost" onclick="logout()" style="display:none">Logout</button>
  </div>
</nav>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Categories</div>
    <div class="cat-list" id="catList">
      <button class="cat-btn active" data-cat="length" onclick="selectCat('length',this)"><span class="cat-ico">📏</span>Length</button>
      <button class="cat-btn" data-cat="weight" onclick="selectCat('weight',this)"><span class="cat-ico">⚖️</span>Weight</button>
      <button class="cat-btn" data-cat="temperature" onclick="selectCat('temperature',this)"><span class="cat-ico">🌡️</span>Temperature</button>
      <button class="cat-btn" data-cat="volume" onclick="selectCat('volume',this)"><span class="cat-ico">🧪</span>Volume</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- CONVERTER -->
    <div class="converter-card">
      <div class="converter-header">
        <div>
          <div class="cat-label" id="catLabel">Length</div>
          <div class="converter-title" id="converterTitle">Unit Converter</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-accent" onclick="selectOperation('convert')" id="convertBtn">Convert</button>
          <button class="btn btn-ghost" onclick="selectOperation('add')" id="addBtn">Add</button>
          <button class="btn btn-ghost" onclick="selectOperation('subtract')" id="subtractBtn">Subtract</button>
          <button class="btn btn-ghost" onclick="selectOperation('compare')" id="compareBtn">Compare</button>
          <button class="btn btn-ghost" onclick="selectOperation('divide')" id="divideBtn">Divide</button>
        </div>
      </div>

      <!-- CONVERT INPUTS -->
      <div id="convertInputs" style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end;margin-bottom:20px">
        <div class="field-group">
          <label>Value</label>
          <input type="number" id="inputVal" value="1" oninput="liveConvert()">
        </div>
        <button class="swap-btn" onclick="swapUnits()" title="Swap units">⇄</button>
        <div class="field-group">
          <label>Result</label>
          <div class="result-box">
            <div>
              <div class="result-main" id="resultMain">—</div>
              <div class="result-formula" id="resultFormula"></div>
            </div>
            <button class="copy-btn" onclick="copyResult()">Copy</button>
          </div>
        </div>
      </div>

      <!-- CONVERT SELECTS -->
      <div id="convertSelects" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <div class="field-group">
          <label>From</label>
          <select id="fromUnit" onchange="liveConvert()"></select>
        </div>
        <div class="field-group">
          <label>To</label>
          <select id="toUnit" onchange="liveConvert()"></select>
        </div>
      </div>

      <!-- OPERATION INPUTS (hidden by default) -->
      <div id="operationInputs" style="display:none;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <div class="field-group">
          <label>Value 1</label>
          <input type="number" id="inputVal1" value="1" oninput="clearResult()">
        </div>
        <div class="field-group">
          <label>Value 2</label>
          <input type="number" id="inputVal2" value="1" oninput="clearResult()">
        </div>
      </div>

      <div id="operationSelects" style="display:none;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
        <div class="field-group">
          <label>Unit 1</label>
          <select id="fromUnit1"></select>
        </div>
        <div class="field-group">
          <label>Unit 2</label>
          <select id="fromUnit2"></select>
        </div>
      </div>

      <!-- OPERATION RESULT (hidden by default) -->
      <div id="operationResult" style="display:none;margin-bottom:20px">
        <div class="result-box">
          <div>
            <div class="result-main" id="operationResultMain">—</div>
            <div class="result-formula" id="operationResultFormula"></div>
          </div>
          <button class="copy-btn" onclick="copyOperationResult()">Copy</button>
        </div>
      </div>

      <button class="convert-btn" onclick="doConvert()" id="convertBtn">⚡ Convert & Save to History</button>
    </div>

  </div>
</div>

<!-- LOGIN POPUP (shown when guest tries to see history) -->
<div class="overlay" id="loginOverlay" onclick="handleOverlayClick(event)">
  <div class="popup">
    <span class="popup-icon">🔐</span>
    <h3>Login to view history</h3>
    <p>
      Your conversion history is tied to your account.<br>
      Each user's history is private — sign in to access yours.
    </p>
    <div class="popup-btns">
      <a href="login.html" class="popup-btn primary">Login to my account</a>
      <a href="login.html?mode=signup" class="popup-btn secondary">Create free account</a>
      <button class="popup-btn ghost" onclick="closePopup()">Stay as guest (no history)</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="../js/dashboard.js"></script>
</body>
</html>
